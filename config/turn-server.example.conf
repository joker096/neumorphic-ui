# Mess&Anger - TURN Server Configuration
# Self-hosted TURN server for P2P relay mode

## Recommended: coturn (open-source)
# Install: https://github.com/coturn/coturn
# Docker: docker run -p 3478:3478 -p 3478:3478/udp -p 50000-60000:50000-60000/udp -e TURN_SECRET=your-secret coturn/coturn

## Production Config (/etc/coturn.conf or /etc/turnserver.conf)

# Basic server settings
lt-cred-mech=true
user=neumorphic-user:neumorphic-secret
realm=messanger.local
# Logging
log-file=/var/log/coturn.log
# Ports
min-port=50000
max-port=60000
# Relay mode
tls-listening-port=5349
tcp-listening-port=3478
# Security
no-stun
no-relay

## Docker Compose (docker-compose.yml)
# version: '3'
# services:
#   turn:
#     image: coturn/coturn:latest
#     ports:
#       - "3478:3478/udp"
#       - "3478:3478/tcp"
#       - "50000-60000:50000-60000/udp"
#     environment:
#       - TURN_SECRET=replace-with-strong-random-secret
#     restart: unless-stopped

## Environment Variables (.env)
# TURN_SERVER_URL=turn:your-server.com:3478
# TURN_SERVER_USER=neumorphic-user
# TURN_SERVER_PASS=neumorphic-secret
# TURN_RELAY_ONLY=true

## ICE Servers for WebRTC
# { urls: 'turn:your-server.com:3478', username: 'neumorphic-user', credential: 'neumorphic-secret' }
# { urls: 'turns:your-server.com:5349', username: 'neumorphic-user', credential: 'neumorphic-secret' }
