name: Security CI
on: [push, pull_request]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Run ESLint security checks
        run: npx eslint --no-config --no-eslintrc --plugin security --rule 'plugin:security/recommended' .

      - name: Run npm audit
        run: npm audit --json --audit-level=high > audit.json || true

      - name: Run npm audit check
        run: npm audit --audit-level=high || exit 1

      - name: Run CodeQL
        uses: github/codeql-action-typescript@v1
        with:
          commands: codeql-db-run
        continue-on-error: true

      - name: Run known-answer crypto tests
        run: npx vitest run tests/crypto-core.test.ts
